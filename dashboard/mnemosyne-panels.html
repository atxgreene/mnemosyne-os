<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mnemosyne Dashboard</title>
  <style>
    :root { --bg:#0a0814; --panel:#141026; --line:#2d2545; --gold:#f4d35e; --muted:#a9a0bd; --text:#f8f5ff; --blue:#6fb9f0; --green:#8eee98; --rose:#ff93b2; }
    *{box-sizing:border-box} body{margin:0;background:radial-gradient(circle at 50% 0%,#221847 0,#0a0814 45%,#05040a 100%);color:var(--text);font-family:Inter,system-ui,Segoe UI,sans-serif;}
    header{padding:28px 32px;border-bottom:1px solid #ffffff14;display:flex;justify-content:space-between;align-items:center;gap:18px;}
    h1{margin:0;font-size:30px;letter-spacing:-.04em}.tag{color:var(--gold);font-size:13px;text-transform:uppercase;letter-spacing:.16em}.wrap{max-width:1280px;margin:0 auto;padding:24px;display:grid;grid-template-columns:1.2fr .8fr;gap:20px}.card{background:linear-gradient(180deg,#ffffff08,#ffffff03);border:1px solid #ffffff14;border-radius:22px;padding:20px;box-shadow:0 24px 80px #0006}.wide{grid-column:1/-1}button,input,textarea{border-radius:14px;border:1px solid #ffffff18;background:#ffffff0a;color:var(--text);padding:11px 13px}button{cursor:pointer;background:#f4d35e;color:#0a0814;font-weight:700;border:0}button.secondary{background:#ffffff0c;color:var(--text);border:1px solid #ffffff18}textarea{width:100%;min-height:96px;resize:vertical}.row{display:flex;gap:10px;align-items:center}.row>*{flex:1}.muted{color:var(--muted)}#graph{width:100%;height:520px;background:#06040d;border:1px solid #ffffff12;border-radius:18px}.list{display:grid;gap:10px}.item{padding:12px;border:1px solid #ffffff12;border-radius:14px;background:#00000022}.pill{display:inline-flex;padding:4px 8px;border-radius:99px;background:#ffffff10;color:var(--gold);font-size:12px;margin-right:6px}.status{font-family:ui-monospace,Consolas,monospace;font-size:13px;color:var(--muted)}@media(max-width:900px){.wrap{grid-template-columns:1fr}header{flex-direction:column;align-items:flex-start}}
  </style>
</head>
<body>
<header>
  <div><div class="tag">Stellas Hereditabimus</div><h1>Mnemosyne OS Dashboard</h1><div class="muted">Live memory graph, native cognitive core, Tugboat routing.</div></div>
  <div class="status" id="health">checking API…</div>
</header>
<main class="wrap">
  <section class="card wide">
    <div class="row" style="justify-content:space-between;margin-bottom:14px"><div><h2>Memory Graph</h2><div class="muted">Nodes are memories. Edges form from shared domains or repeated terms.</div></div><button class="secondary" onclick="loadGraph()">Regenerate</button></div>
    <svg id="graph"></svg>
  </section>
  <section class="card">
    <h2>Store Memory</h2>
    <textarea id="memoryText" placeholder="Capture an insight, synthesis, decision, or observation…"></textarea>
    <div class="row" style="margin-top:10px"><input id="domain" placeholder="domain" value="general"><input id="importance" placeholder="importance" value="medium"><button onclick="storeMemory()">Store</button></div>
  </section>
  <section class="card">
    <h2>Tugboat Route</h2>
    <textarea id="goalText" placeholder="Route a goal through memory, skills, and security policy…">Synthesize research on Mnemosyne OS memory graphs</textarea>
    <div class="row" style="margin-top:10px"><button onclick="routeGoal()">Route Goal</button></div>
    <pre class="status" id="routeOut"></pre>
  </section>
  <section class="card">
    <h2>Recent Memory</h2>
    <div class="list" id="memoryList"></div>
  </section>
  <section class="card">
    <h2>Skills</h2>
    <div class="list" id="skillList"></div>
  </section>
</main>
<script>
const API = localStorage.mnemosyneApi || 'http://127.0.0.1:8765';
const colors = ['#f4d35e','#6fb9f0','#8eee98','#ff93b2','#cb86db','#fb6f5f'];
function colorFor(s){let n=0; for(const ch of String(s)) n=(n+ch.charCodeAt(0))%colors.length; return colors[n];}
async function json(path, opts={}){const r=await fetch(API+path, opts); if(!r.ok) throw new Error(await r.text()); return r.json();}
async function health(){try{const h=await json('/health'); document.getElementById('health').textContent=`API online • ${h.memory.total_entries} memories • ${h.skills} skills`; }catch(e){document.getElementById('health').textContent='API offline — run scripts/run-dev.sh';}}
async function storeMemory(){const content=memoryText.value.trim(); if(!content) return; await json('/memory/add',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({content,metadata:{domain:domain.value||'general',importance:importance.value||'medium'}})}); memoryText.value=''; await refresh();}
async function routeGoal(){const goal=goalText.value.trim(); const r=await json('/tugboat/route',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({goal})}); routeOut.textContent=JSON.stringify(r,null,2);}
async function loadLists(){const memories=await json('/memory/search?query=&limit=8'); memoryList.innerHTML=memories.map(m=>`<div class="item"><span class="pill">${m.metadata.domain||'general'}</span>${m.content}</div>`).join('')||'<div class="muted">No memories yet.</div>'; const skills=await json('/skills'); skillList.innerHTML=skills.map(s=>`<div class="item"><b>${s.name}</b><br><span class="muted">${s.description}</span></div>`).join('')||'<div class="muted">No skills yet.</div>';}
function drawGraph(data){const svg=document.getElementById('graph'), w=svg.clientWidth, h=svg.clientHeight; svg.setAttribute('viewBox',`0 0 ${w} ${h}`); svg.innerHTML=''; const nodes=data.nodes.map((n,i)=>({...n,x:w/2+Math.cos(i*2.4)*Math.min(w,h)*.28,y:h/2+Math.sin(i*2.4)*Math.min(w,h)*.28,vx:0,vy:0})); const byId=Object.fromEntries(nodes.map(n=>[n.id,n])); for(let t=0;t<140;t++){for(const n of nodes){n.vx+=(w/2-n.x)*.0008; n.vy+=(h/2-n.y)*.0008;} for(let i=0;i<nodes.length;i++)for(let j=i+1;j<nodes.length;j++){const a=nodes[i],b=nodes[j],dx=a.x-b.x,dy=a.y-b.y,d=Math.max(1,Math.hypot(dx,dy)),f=900/(d*d); a.vx+=dx/d*f; a.vy+=dy/d*f; b.vx-=dx/d*f; b.vy-=dy/d*f;} for(const e of data.edges){const a=byId[e.source],b=byId[e.target]; if(!a||!b)continue; const dx=b.x-a.x,dy=b.y-a.y,d=Math.max(1,Math.hypot(dx,dy)),f=(d-180)*.004; a.vx+=dx/d*f; a.vy+=dy/d*f; b.vx-=dx/d*f; b.vy-=dy/d*f;} for(const n of nodes){n.x+=n.vx; n.y+=n.vy; n.vx*=.86; n.vy*=.86;}}
for(const e of data.edges){const a=byId[e.source],b=byId[e.target]; if(!a||!b)continue; const line=document.createElementNS('http://www.w3.org/2000/svg','line'); line.setAttribute('x1',a.x);line.setAttribute('y1',a.y);line.setAttribute('x2',b.x);line.setAttribute('y2',b.y);line.setAttribute('stroke','#ffffff2a');line.setAttribute('stroke-width',e.weight||1); svg.appendChild(line);} for(const n of nodes){const g=document.createElementNS('http://www.w3.org/2000/svg','g'); const c=document.createElementNS('http://www.w3.org/2000/svg','circle'); c.setAttribute('cx',n.x);c.setAttribute('cy',n.y);c.setAttribute('r',16);c.setAttribute('fill',colorFor(n.domain));c.setAttribute('opacity','.92'); const title=document.createElementNS('http://www.w3.org/2000/svg','title'); title.textContent=n.title; c.appendChild(title); const text=document.createElementNS('http://www.w3.org/2000/svg','text'); text.setAttribute('x',n.x+22);text.setAttribute('y',n.y+4);text.setAttribute('fill','#f8f5ff');text.setAttribute('font-size','12');text.textContent=n.label; g.appendChild(c);g.appendChild(text);svg.appendChild(g);}}
async function loadGraph(){try{drawGraph(await json('/memory/graph'));}catch(e){drawGraph({nodes:[{id:'a',label:'API offline',title:'Run scripts/run-dev.sh',domain:'system'},{id:'b',label:'Mnemosyne',title:'Local cognitive core',domain:'mnemosyne'}],edges:[{source:'a',target:'b'}]});}}
async function refresh(){await health(); await loadLists().catch(()=>{}); await loadGraph();}
refresh();
</script>
</body>
</html>
